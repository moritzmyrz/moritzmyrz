name: Dynamic README puzzle injection
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  get-lichess-puzzle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install

      - run: node .

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "[Automated] Update README with puzzle" \
              -m "Co-authored-by: moritzmyrz <64229413+moritzmyrz@users.noreply.github.com>"
            git push
          fi
