name: Discussion Q&A
on:
  schedule:
    # Trigger every 15 minutes, but cap scheduled executions below.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      discussion_title:
        description: "Discussion title"
        required: true
        default: "Example question"
      discussion_body:
        description: "Discussion body (the question)"
        required: true
        default: "This is an example question for the Q&A."
      reply_body:
        description: "Reply body (the answer)"
        required: true
        default: "This is the accepted answer."

jobs:
  discussion-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce scheduled run cap
        id: run-cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_FILE: discussion-qa-workflow.yml
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Skipping cap check for non-scheduled run."
            exit 0
          fi

          CUTOFF=$(date -u -d '7 days ago' +%s)
          RES=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/$WORKFLOW_FILE/runs?event=schedule&per_page=100")

          COUNT=$(echo "$RES" | jq --argjson cutoff "$CUTOFF" '
            [.workflow_runs[]
             | select((.created_at | fromdateiso8601) >= $cutoff)
            ] | length
          ')

          echo "Scheduled runs in last 7 days: $COUNT"
          if [ "$COUNT" -ge 32 ]; then
            echo "Run cap reached (32). Skipping this execution."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build discussion content
        id: content
        if: steps.run-cap.outputs.should_run == 'true'
        env:
          INPUT_TITLE: ${{ github.event.inputs.discussion_title }}
          INPUT_BODY: ${{ github.event.inputs.discussion_body }}
          INPUT_REPLY: ${{ github.event.inputs.reply_body }}
        run: |
          titles=(
            "Quick GitHub Actions question"
            "Workflow behavior check"
            "CI timing question"
            "Need help with automation"
            "Actions token scope question"
            "Build reliability question"
            "Scheduled pipeline design question"
            "Repository automation best practice"
            "GraphQL mutation troubleshooting"
            "Discussion workflow tuning"
            "Actions performance question"
            "Automation stability discussion"
            "GitHub API usage question"
            "Workflow retries and guards"
            "Q&A workflow quality check"
            "Release automation concern"
            "Reducing CI noise question"
            "Cross-workflow coordination question"
            "Token permissions clarification"
            "Workflow observability question"
            "Keeping scheduled jobs healthy"
            "Safe defaults for automation"
            "Error handling in workflows"
            "Practical CI maintenance question"
            "Recurring automation strategy"
            "Actions throttling question"
            "Scheduled run consistency question"
            "Automation preflight checks"
            "Discussion category selection issue"
            "CI guardrail implementation"
            "API rate-limit handling question"
            "Workflow fallback behavior"
            "Generated content quality question"
            "Actions debugging strategy"
            "Mutation payload validation"
            "Workflow resilience improvement"
          )
          questions=(
            "What is the cleanest way to avoid duplicate workflow runs in GitHub Actions?"
            "What is a practical pattern to safely handle retries in scheduled workflows?"
            "How can I make a scheduled workflow less noisy while keeping useful logs?"
            "When should I prefer PATs over GITHUB_TOKEN for GraphQL mutations?"
            "What is a simple way to rate-limit workflow automation without extra services?"
            "How do you keep recurring workflow content varied for test data?"
            "What is a reliable way to stop overlapping scheduled runs?"
            "How can I guard against empty payload fields before a GraphQL mutation?"
            "Should a scheduled workflow fail hard or skip softly when preconditions are missing?"
            "How do you structure workflow steps to keep failures easy to debug?"
            "What is a good fallback strategy when a selected discussion category is unavailable?"
            "How can I keep generated content readable while still making it random?"
            "What is the safest way to use random strings in CI without leaking secrets?"
            "How can I verify that workflow output variables are set correctly?"
            "What is the best way to cap runs over a rolling seven-day window?"
            "How should I test schedule logic without waiting for real cron ticks?"
            "How do you make scheduled automation idempotent?"
            "What are good conventions for naming generated discussion threads?"
            "How can I reduce API calls in a multi-step workflow?"
            "Should I split this workflow into multiple jobs for reliability?"
            "How can I detect permission issues early in an Actions run?"
            "What are practical patterns for handling transient GitHub API failures?"
            "How should I decide between REST and GraphQL in GitHub Actions?"
            "How can I keep random test data from looking too repetitive?"
            "What logging details are most useful for diagnosing failed scheduled runs?"
            "How can I keep workflow runtime short while still doing safety checks?"
            "What is a clean way to skip downstream steps after a guard condition?"
            "How can I ensure generated Q&A pairs stay technically coherent?"
            "Should question and answer pools be in arrays or separate files?"
            "How do you prevent accidental API abuse in frequently scheduled workflows?"
            "How can I keep discussion titles unique without making them unreadable?"
            "What is a good way to handle daylight savings and timezone confusion in schedules?"
            "How can I validate that a workflow token has the right scopes before mutating data?"
            "What is the cleanest way to separate content generation from API mutation logic?"
            "How can I quickly spot whether a failure is from data, auth, or rate limits?"
            "Should I keep one large workflow file or split shared logic into reusable workflows?"
            "How can I avoid posting near-duplicate discussions across frequent runs?"
            "What is a practical way to enforce a maximum number of created discussions per day?"
            "How can I make random answers sound consistent with the question tone?"
            "What minimal telemetry should I log to troubleshoot flaky scheduled runs?"
          )
          answers=(
            "Use a lightweight guard step early, then skip the rest of the job when limits are reached."
            "Track recent runs and short-circuit before expensive operations."
            "Keep logs concise and add context only on failure to reduce noise."
            "Use GITHUB_TOKEN where possible and PATs only when required by missing scopes."
            "A rolling window cap plus random variation usually keeps automation predictable."
            "Generate small randomized phrases and timestamps, while keeping content readable."
            "Use a concurrency group and cancel in-progress runs to prevent overlap."
            "Validate all required outputs before building the mutation payload."
            "Skip gracefully for missing preconditions unless data integrity is at risk."
            "Keep each step focused and emit clear one-line status messages."
            "Attempt answerable category first, then fall back to the first available category."
            "Randomize from curated sentence pools instead of fully free-form generation."
            "Avoid storing generated values in secrets and keep logs free of token-like strings."
            "Write outputs once and check for blank values before consuming them downstream."
            "Count recent scheduled runs from the API and gate execution above threshold."
            "Use workflow_dispatch for manual validation and compare logs against schedule runs."
            "Design mutations to be safe when retried and avoid side effects on partial failures."
            "Prefix titles with stable text and append a short random suffix."
            "Fetch repository metadata once and reuse outputs across steps."
            "Split only when steps have independent retry or permission requirements."
            "Add a quick token smoke check against a read endpoint before mutation steps."
            "Retry idempotent calls with small backoff and stop after a few attempts."
            "Use GraphQL for nested data and REST for straightforward list endpoints."
            "Use a larger pool of short phrases plus timestamps to increase variance."
            "Log event type, selected category, and generated IDs to make failures traceable."
            "Run guards first and avoid any expensive API call when skip conditions are met."
            "Select question and answer indices independently from sizable pools."
            "Keep arrays in workflow while small; move to files only when maintenance gets painful."
            "Enforce caps and narrow scopes so frequent schedules remain safe."
            "Add explicit checks for null IDs and print API errors in structured JSON."
            "Keep mutation payloads minimal and avoid optional fields unless needed."
            "Prefer deterministic defaults for manual runs and randomized defaults for scheduled runs."
            "Use a stable title prefix and append a short random numeric suffix for uniqueness."
            "Store and compare UTC timestamps only, and keep cron comments explicit in UTC."
            "Make a lightweight read call first and fail early if expected permissions are missing."
            "Generate content in one step and pass outputs forward to dedicated mutation steps."
            "Emit structured error context with endpoint, status, and parsed error keys."
            "Split logic only when it improves ownership or retry behavior; otherwise keep it simple."
            "Keep a recent-title cache or include timestamp granularity to reduce duplicates."
            "Track created count in a rolling window and gate the create step when threshold is hit."
            "Use curated sentence templates so randomness stays coherent and technical."
            "Log run id, event name, selected category, and created resource ids for fast triage."
          )

          suffix=$((RANDOM % 100000))
          stamp=$(date -u +"%Y-%m-%d %H:%M UTC")

          if [ -n "$INPUT_TITLE" ]; then
            title="$INPUT_TITLE"
          else
            title_idx=$((RANDOM % ${#titles[@]}))
            title="${titles[$title_idx]} #$suffix"
          fi

          if [ -n "$INPUT_BODY" ]; then
            body="$INPUT_BODY"
          else
            question_idx=$((RANDOM % ${#questions[@]}))
            body="${questions[$question_idx]} (generated $stamp)"
          fi

          if [ -n "$INPUT_REPLY" ]; then
            reply="$INPUT_REPLY"
          else
            answer_idx=$((RANDOM % ${#answers[@]}))
            reply="${answers[$answer_idx]} (run $suffix)"
          fi

          if [ -z "${title// }" ] || [ -z "${body// }" ] || [ -z "${reply// }" ]; then
            echo "Generated content is blank. Failing fast."
            exit 1
          fi

          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "body=$body" >> "$GITHUB_OUTPUT"
          echo "reply=$reply" >> "$GITHUB_OUTPUT"

      - name: Get repository and category IDs
        id: ids
        if: steps.run-cap.outputs.should_run == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"query { repository(owner: \\\"$OWNER\\\", name: \\\"$REPO\\\") { id discussionCategories(first: 25) { nodes { id name isAnswerable } } } }\"}")
          REPO_ID=$(echo "$RES" | jq -r '.data.repository.id')
          CATEGORY_ID=$(echo "$RES" | jq -r '.data.repository.discussionCategories.nodes[] | select(.isAnswerable == true) | .id' | head -n 1)
          CATEGORY_NAME=$(echo "$RES" | jq -r '.data.repository.discussionCategories.nodes[] | select(.isAnswerable == true) | .name' | head -n 1)
          echo "repository_id=$REPO_ID" >> $GITHUB_OUTPUT
          echo "category_id=$CATEGORY_ID" >> $GITHUB_OUTPUT
          if [ -n "$CATEGORY_NAME" ] && [ "$CATEGORY_NAME" != "null" ]; then
            echo "Using answerable category: $CATEGORY_NAME"
          fi
          if [ "$REPO_ID" = "null" ] || [ -z "$CATEGORY_ID" ] || [ "$CATEGORY_ID" = "null" ]; then
            echo "Failed to get repo ID or an answerable category."
            echo "Create a Discussions category with answers enabled (for example Q&A)."
            echo "$RES" | jq .
            exit 1
          fi

      - name: Create discussion
        id: create
        if: steps.run-cap.outputs.should_run == 'true'
        env:
          PAT_TOKEN_2: ${{ secrets.PAT_TOKEN_2 }}
          REPO_ID: ${{ steps.ids.outputs.repository_id }}
          CATEGORY_ID: ${{ steps.ids.outputs.category_id }}
          TITLE: ${{ steps.content.outputs.title }}
          BODY: ${{ steps.content.outputs.body }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_ID" \
            --arg cat "$CATEGORY_ID" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{
              query: "mutation($repo: ID!, $cat: ID!, $title: String!, $body: String!) { createDiscussion(input: { repositoryId: $repo, categoryId: $cat, title: $title, body: $body }) { discussion { id } } }",
              variables: { repo: $repo, cat: $cat, title: $title, body: $body }
            }')
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN_2" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          DISC_ID=$(echo "$RES" | jq -r '.data.createDiscussion.discussion.id')
          echo "discussion_id=$DISC_ID" >> $GITHUB_OUTPUT
          if [ "$DISC_ID" = "null" ]; then
            echo "Failed to create discussion:"
            echo "$RES" | jq .
            exit 1
          fi

      - name: Reply to discussion
        id: reply
        if: steps.run-cap.outputs.should_run == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          DISC_ID: ${{ steps.create.outputs.discussion_id }}
          BODY: ${{ steps.content.outputs.reply }}
        run: |
          PAYLOAD=$(jq -n \
            --arg disc "$DISC_ID" \
            --arg body "$BODY" \
            '{
              query: "mutation($disc: ID!, $body: String!) { addDiscussionComment(input: { discussionId: $disc, body: $body }) { comment { id } } }",
              variables: { disc: $disc, body: $body }
            }')
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          COMMENT_ID=$(echo "$RES" | jq -r '.data.addDiscussionComment.comment.id')
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
          if [ "$COMMENT_ID" = "null" ]; then
            echo "Failed to add reply:"
            echo "$RES" | jq .
            exit 1
          fi

      - name: Mark reply as accepted answer
        if: steps.run-cap.outputs.should_run == 'true'
        env:
          PAT_TOKEN_2: ${{ secrets.PAT_TOKEN_2 }}
          COMMENT_ID: ${{ steps.reply.outputs.comment_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg comment "$COMMENT_ID" \
            '{
              query: "mutation($comment: ID!) { markDiscussionCommentAsAnswer(input: { id: $comment }) { discussion { id isAnswered } } }",
              variables: { comment: $comment }
            }')
          RES=$(curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $PAT_TOKEN_2" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if echo "$RES" | jq -e '.data.markDiscussionCommentAsAnswer.discussion.isAnswered == true' > /dev/null 2>&1; then
            echo "Reply marked as accepted answer."
          else
            echo "Failed to mark as answer (e.g. only discussion author can):"
            echo "$RES" | jq .
            exit 1
          fi

